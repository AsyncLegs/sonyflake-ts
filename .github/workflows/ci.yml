name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-bun:
    name: test (bun + go compat)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: compat/go.sum

      - name: Build Go compat helper
        working-directory: compat
        run: go build -o sonyflake-compat .

      - name: Install deps
        run: bun install --no-save

      - name: Build TS
        run: bun run build

      - name: Test (vitest under Bun, includes sony/sonyflake compat)
        run: bun x vitest run

  test-node:
    name: test (node + go compat)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: compat/go.sum

      - name: Build Go compat helper
        working-directory: compat
        run: go build -o sonyflake-compat .

      - name: Install deps
        run: npm install --no-save

      - name: Build TS
        run: npm run build

      - name: Test (vitest under Node, includes sony/sonyflake compat)
        run: npx vitest run

  pack-dry-run:
    name: npm pack (dry run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-save
      - run: npm run build
      - run: npm pack --dry-run
